name: untitled
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  flutter_bloc: ^9.1.1
  image_picker: ^1.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  equatable: ^2.0.7
  dio: ^5.9.2
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - asstes/images/
    - asstes/icons/

  fonts:
    - family: NotoKufiArabic
      fonts:
        - asset: asstes/fonts/NotoKufiArabic-Thin.ttf
          weight: 100
        - asset: asstes/fonts/NotoKufiArabic-Light.ttf
          weight: 300
        - asset: asstes/fonts/NotoKufiArabic-Regular.ttf
          weight: 400
        - asset: asstes/fonts/NotoKufiArabic-Medium.ttf
          weight: 500
        - asset: asstes/fonts/NotoKufiArabic-SemiBold.ttf
          weight: 600
        - asset: asstes/fonts/NotoKufiArabic-Bold.ttf
          weight: 700
